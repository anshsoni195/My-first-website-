<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        body { font-family: sans-serif; background: #f4f5f7; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; color: #333; margin-top: 0; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { background: #0066ff; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .task-text { cursor: pointer; flex: 1; }
        .completed { text-decoration: line-through; color: #888; }
        .delete-btn { background: #ff3b30; font-size: 12px; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Task Manager</h1>
    
    <div class="input-group">
        <input type="text" id="task-input" placeholder="Add a new task...">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="task-list"></ul>
</div>

<script>
    const API_URL = 'http://localhost:5000/api/tasks';

    async function loadTasks() {
        const res = await fetch(API_URL);
        const tasks = await res.json();
        const list = document.getElementById('task-list');
        list.innerHTML = '';
        
        tasks.forEach(task => {
            const li = document.createElement('li');
            li.innerHTML = `
                <span class="task-text ${task.completed ? 'completed' : ''}" onclick="toggleTask(${task.id})">
                    ${task.title}
                </span>
                <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
            `;
            list.appendChild(li);
        });
    }

    async function addTask() {
        const input = document.getElementById('task-input');
        if (!input.value.trim()) return;

        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: input.value })
        });
        input.value = '';
        loadTasks();
    }

    async function toggleTask(id) {
        await fetch(`${API_URL}/${id}`, { method: 'PUT' });
        loadTasks();
    }

    async function deleteTask(id) {
        await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        loadTasks();
    }

    window.onload = loadTasks;
</script>
</body>
</html>
