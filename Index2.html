<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Portfolio</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f9; text-align: center; }
        header { background: #333; color: #fff; padding: 20px; border-radius: 8px; }
        .projects-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 250px; text-align: left; }
        .tag { background: #007BFF; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Portfolio</h1>
        <p>Full-Stack Developer</p>
    </header>

    <main>
        <h2>My Projects</h2>
        <div class="projects-container" id="projects-list">
            <p>Loading projects...</p>
        </div>
    </main>

    <script>
        // Fetch projects from the backend API
        async function fetchProjects() {
            try {
                const response = await fetch('http://localhost:5000/api/projects');
                const projects = await response.json();
                
                const container = document.getElementById('projects-list');
                container.innerHTML = ''; // Clear loading text

                projects.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const tags = project.techStack.map(tech => `<span class="tag">${tech}</span>`).join('');
                    
                    card.innerHTML = `
                        <h3>${project.title}</h3>
                        <p>${project.description}</p>
                        <div>${tags}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching projects:", error);
                document.getElementById('projects-list').innerHTML = '<p>Failed to load projects.</p>';
            }
        }

        // Run function on page load
        fetchProjects();
    </script>
</body>
</html>
