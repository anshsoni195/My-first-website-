<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist E-Commerce Store</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f9f9fb; margin: 0; padding: 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 768px) { body { grid-template-columns: 1fr; } }
        header { grid-column: 1 / -1; background: #1a1a24; color: white; padding: 15px 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .product-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; }
        .product-card div { font-size: 40px; margin-bottom: 10px; }
        button { background: #00cc66; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #00b359; }
        .cart-panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); height: fit-content; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <h2>⚡ TechStore</h2>
    <p>Role: <strong>User/Admin</strong></p>
</header>

<div>
    <h3>Product Catalog</h3>
    <div class="catalog" id="catalog-list">Loading catalog...</div>
</div>

<div class="cart-panel">
    <h3>Your Cart</h3>
    <div id="cart-contents">Cart is empty.</div>
    <hr>
    <h4>Total: $<span id="cart-total">0.00</span></h4>
    <button onclick="checkout()" style="background: #0066ff;">Proceed to Checkout</button>
</div>

<script>
    const API_URL = 'http://localhost:5000/api';
    let cart = [];

    async function loadProducts() {
        const res = await fetch(`${API_URL}/products`);
        const products = await res.json();
        const catalog = document.getElementById('catalog-list');
        catalog.innerHTML = '';

        products.forEach(p => {
            const el = document.createElement('div');
            el.className = 'product-card';
            el.innerHTML = `
                <div>${p.image}</div>
                <h4>${p.name}</h4>
                <p>$${p.price.toFixed(2)}</p>
                <button onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Add to Cart</button>
            `;
            catalog.appendChild(el);
        });
    }

    function addToCart(id, name, price) {
        cart.push({ id, name, price });
        updateCartUI();
    }

    function updateCartUI() {
        const contents = document.getElementById('cart-contents');
        const totalEl = document.getElementById('cart-total');
        
        if (cart.length === 0) {
            contents.innerHTML = 'Cart is empty.';
            totalEl.innerText = '0.00';
            return;
        }

        contents.innerHTML = cart.map(item => `
            <div class="cart-item">
                <span>${item.name}</span>
                <strong>$${item.price.toFixed(2)}</strong>
            </div>
        `).join('');

        const total = cart.reduce((sum, item) => sum + item.price, 0);
        totalEl.innerText = total.toFixed(2);
    }

    async function checkout() {
        if (cart.length === 0) return alert("Add items to your cart first!");
        
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        const res = await fetch(`${API_URL}/orders`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cartItems: cart, total: total })
        });
        
        const data = await res.json();
        if (data.success) {
            alert(`${data.message}\nTracking ID: ${data.orderId}`);
            cart = [];
            updateCartUI();
        }
    }

    window.onload = loadProducts;
</script>
</body>
</html>
