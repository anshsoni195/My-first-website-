<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Platform</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: 0 auto; }
        header { background: #0066ff; color: white; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        .form-group { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #0066ff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .post-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .comment-box { background: #f1f3f5; padding: 8px 12px; border-radius: 5px; margin-top: 5px; font-size: 14px; }
        .comment-input-group { display: flex; gap: 8px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Dev Blog Space</h1>
        <p>Read, Write, and Connect</p>
    </header>

    <!-- Create Post Section -->
    <div class="form-group">
        <h3>Create a New Post</h3>
        <input type="text" id="post-title" placeholder="Post Title">
        <textarea id="post-content" rows="4" placeholder="Write your content here..."></textarea>
        <button onclick="createPost()">Publish Post</button>
    </div>

    <!-- Blog Feed Section -->
    <h2>Recent Feed</h2>
    <div id="blog-feed">Loading posts...</div>
</div>

<script>
    const API_URL = 'http://localhost:5000/api/posts';

    async function loadPosts() {
        const res = await fetch(API_URL);
        const posts = await res.json();
        const feed = document.getElementById('blog-feed');
        feed.innerHTML = '';

        if (posts.length === 0) {
            feed.innerHTML = '<p>No posts available yet.</p>';
            return;
        }

        posts.forEach(post => {
            const card = document.createElement('div');
            card.className = 'post-card';
            
            const commentsHtml = post.comments.map(c => `<div class="comment-box">${c}</div>`).join('');

            card.innerHTML = `
                <h3>${post.title}</h3>
                <p>${post.content}</p>
                <hr>
                <h4>Comments (${post.comments.length})</h4>
                <div>${commentsHtml || '<p style="color:#777; font-size:13px;">No comments yet.</p>'}</div>
                
                <div class="comment-input-group">
                    <input type="text" id="comment-for-${post.id}" placeholder="Write a comment...">
                    <button onclick="addComment(${post.id})">Reply</button>
                </div>
            `;
            feed.appendChild(card);
        });
    }

    async function createPost() {
        const title = document.getElementById('post-title').value.trim();
        const content = document.getElementById('post-content').value.trim();
        if (!title || !content) return alert("Please fill out both title and content!");

        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, content })
        });

        document.getElementById('post-title').value = '';
        document.getElementById('post-content').value = '';
        loadPosts();
    }

    async function addComment(postId) {
        const input = document.getElementById(`comment-for-${postId}`);
        const comment = input.value.trim();
        if (!comment) return;

        await fetch(`${API_URL}/${postId}/comments`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ comment })
        });

        input.value = '';
        loadPosts();
    }

    window.onload = loadPosts;
</script>
</body>
</html>
